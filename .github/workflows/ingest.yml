name: Daily ingest

on:
  schedule:
    # Daily at 07:10 UTC. Bench owners push whenever they push — new models
    # trickle into their repos over days, so we just check every day.
    - cron: "10 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ingest all benchmarks
        run: npm run ingest
        env:
          # Authenticates GitHub API calls (e.g. planning-benchmark's branch
          # listing) so the shared-IP runner doesn't hit the 60/hr limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Push refreshed snapshots to the Convex backend the site reads.
          # Set both as repo secrets; ingest skips the push if absent.
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}

      - name: Sanity-check the site still builds
        run: npm run build
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}

      - name: Commit refreshed snapshots (only if data changed)
        run: |
          if git diff --quiet src/data/; then
            echo "No benchmark data changed today."
            exit 0
          fi
          git config user.name "benchdirectory-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/
          git commit -m "data: daily ingest $(date -u +%Y-%m-%d)"
          git push
